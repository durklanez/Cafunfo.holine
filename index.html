<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafunfo Online</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

.tela {
    display: none;
    padding: 20px;
}

.ativa {
    display: block;
}

input {
    display: block;
    margin: 10px auto;
    padding: 12px;
    width: 90%;
    max-width: 300px;
}

button {
    display: block;
    margin: 10px auto;
    padding: 14px;
    width: 90%;
    max-width: 300px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
}

.verde { background: #00c853; color: white; }
.azul { background: #2979ff; color: white; }
.laranja { background: orange; }
.roxo { background: purple; color: white; }

.produto {
    border: 1px solid #444;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- INICIO -->
<div id="inicio" class="tela ativa">
    <h1>🌍 Bem-vindo ao Cafunfo Online</h1>

    <button class="verde" onclick="mostrar('criar')">Criar Conta</button>
    <button class="azul" onclick="mostrar('login')">Login</button>
</div>

<!-- LOGIN -->
<div id="login" class="tela">
    <h2>Login</h2>
    <input id="loginNumero" placeholder="Número">
    <input id="loginSenha" type="password" placeholder="Senha">

    <button class="azul" onclick="entrar()">Entrar</button>
    <button onclick="mostrar('inicio')">Voltar</button>

    <p id="msgLogin"></p>
</div>

<!-- CRIAR CONTA -->
<div id="criar" class="tela">
    <h2>Criar Conta</h2>
    <input id="novoNumero" placeholder="Número">
    <input id="novaSenha" type="password" placeholder="Senha">

    <button class="verde" onclick="criarConta()">Criar Conta</button>
    <button onclick="mostrar('inicio')">Voltar</button>
</div>

<!-- MENU -->
<div id="menu" class="tela">
    <h2>📂 Menu</h2>

    <button class="laranja" onclick="mostrar('mercado')">🛒 Mercado</button>
    <button class="verde" onclick="mostrar('publicar')">➕ Publicar Produto</button>
    <button class="roxo" onclick="mostrar('perfil')">👤 Perfil</button>
    <button onclick="logout()">Sair</button>
</div>

<!-- PUBLICAR PRODUTO -->
<div id="publicar" class="tela">
    <h2>📦 Publicar Produto</h2>

    <input id="nomeProduto" placeholder="Nome do produto">
    <input id="precoProduto" placeholder="Preço">

    <button class="verde" onclick="publicarProduto()">Publicar</button>
    <button onclick="mostrar('menu')">Voltar</button>
</div>

<!-- PERFIL -->
<div id="perfil" class="tela">
    <h2>👤 Meu Perfil</h2>
    <p>Número:</p>
    <p id="numPerfil"></p>

    <button onclick="mostrar('menu')">Voltar</button>
</div>

<!-- MERCADO -->
<div id="mercado" class="tela">
    <h2>🛒 Mercado</h2>

    <input id="pesquisa" placeholder="Pesquisar..." onkeyup="filtrar()">

    <div id="lista"></div>

    <button onclick="mostrar('menu')">Voltar</button>
</div>

<script>
// TROCAR TELAS
function mostrar(id) {
    let telas = document.getElementsByClassName("tela");
    for (let i = 0; i < telas.length; i++) {
        telas[i].classList.remove("ativa");
    }
    document.getElementById(id).classList.add("ativa");

    if(id === "perfil") {
        document.getElementById("numPerfil").innerText =
            localStorage.getItem("numero") || "Não logado";
    }

    if(id === "mercado") {
        carregarProdutos();
    }
}

// CRIAR CONTA
function criarConta() {
    let n = document.getElementById("novoNumero").value;
    let s = document.getElementById("novaSenha").value;

    if(n === "" || s === "") {
        alert("Preenche tudo!");
        return;
    }

    localStorage.setItem("numero", n);
    localStorage.setItem("senha", s);

    alert("Conta criada!");
    mostrar('login');
}

// LOGIN
function entrar() {
    let n = document.getElementById("loginNumero").value;
    let s = document.getElementById("loginSenha").value;

    let n2 = localStorage.getItem("numero");
    let s2 = localStorage.getItem("senha");

    if(n === n2 && s === s2) {
        mostrar('menu');
    } else {
        document.getElementById("msgLogin").innerText = "Erro no login!";
    }
}

// LOGOUT
function logout() {
    mostrar('inicio');
}

// PUBLICAR PRODUTO
function publicarProduto() {
    let nome = document.getElementById("nomeProduto").value;
    let preco = document.getElementById("precoProduto").value;

    if(nome === "" || preco === "") {
        alert("Preenche tudo!");
        return;
    }

    let produtos = JSON.parse(localStorage.getItem("produtos")) || [];

    produtos.push({
        nome: nome,
        preco: preco
    });

    localStorage.setItem("produtos", JSON.stringify(produtos));

    alert("Produto publicado!");
    mostrar('mercado');
}

// CARREGAR PRODUTOS
function carregarProdutos() {
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    let produtos = JSON.parse(localStorage.getItem("produtos")) || [];

    produtos.forEach(p => {
        let div = document.createElement("div");
        div.className = "produto";
        div.innerText = p.nome + " - " + p.preco + " kz";
        lista.appendChild(div);
    });
}

// PESQUISA
function filtrar() {
    let input = document.getElementById("pesquisa").value.toLowerCase();
    let itens = document.getElementsByClassName("produto");

    for(let i = 0; i < itens.length; i++) {
        let texto = itens[i].innerText.toLowerCase();
        itens[i].style.display = texto.includes(input) ? "block" : "none";
    }
}
</script>

</body>
</html>
