<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafunfo Online</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

.tela { display: none; padding: 20px; }
.ativa { display: block; }

input, textarea {
    display: block;
    margin: 10px auto;
    padding: 12px;
    width: 90%;
    max-width: 300px;
}

button {
    display: block;
    margin: 10px auto;
    padding: 14px;
    width: 90%;
    max-width: 300px;
    border: none;
    border-radius: 10px;
}

.verde { background: #00c853; color: white; }
.azul { background: #2979ff; color: white; }
.laranja { background: orange; }
.roxo { background: purple; color: white; }

.produto {
    border: 1px solid #444;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}

img {
    width: 100%;
    max-width: 200px;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- INICIO -->
<div id="inicio" class="tela ativa">
    <h1>🌍 Cafunfo Online</h1>
    <button class="verde" onclick="mostrar('criar')">Criar Conta</button>
    <button class="azul" onclick="mostrar('login')">Login</button>
</div>

<!-- LOGIN -->
<div id="login" class="tela">
    <h2>Login</h2>
    <input id="loginNumero" placeholder="Número">
    <input id="loginSenha" type="password" placeholder="Senha">
    <button class="azul" onclick="entrar()">Entrar</button>
    <button onclick="mostrar('inicio')">Voltar</button>
</div>

<!-- CRIAR -->
<div id="criar" class="tela">
    <h2>Criar Conta</h2>
    <input id="novoNumero" placeholder="Número">
    <input id="novaSenha" type="password" placeholder="Senha">
    <button class="verde" onclick="criarConta()">Criar Conta</button>
    <button onclick="mostrar('inicio')">Voltar</button>
</div>

<!-- MENU -->
<div id="menu" class="tela">
    <h2>📂 Menu</h2>
    <button class="laranja" onclick="mostrar('mercado')">🛒 Mercado</button>
    <button class="verde" onclick="mostrar('publicar')">➕ Publicar Produto</button>
    <button class="roxo" onclick="mostrar('perfil')">👤 Perfil</button>
    <button onclick="logout()">Sair</button>
</div>

<!-- PUBLICAR -->
<div id="publicar" class="tela">
    <h2>📦 Publicar Produto</h2>

    <input id="nomeProduto" placeholder="Nome">
    <input id="precoProduto" placeholder="Preço">
    <textarea id="descProduto" placeholder="Descrição"></textarea>
    <input type="file" id="fotoProduto">

    <button class="verde" onclick="publicarProduto()">Publicar</button>
    <button onclick="mostrar('menu')">Voltar</button>
</div>

<!-- PERFIL -->
<div id="perfil" class="tela">
    <h2>👤 Perfil</h2>

    <input type="file" id="fotoPerfil" onchange="salvarFoto()">

    <img id="imgPerfil" style="width:120px;height:120px;border-radius:50%;">

    <p id="numPerfil"></p>

    <h3>📦 Meus Produtos</h3>
    <div id="meusProdutos"></div>

    <button onclick="mostrar('menu')">Voltar</button>
</div>

<!-- MERCADO -->
<div id="mercado" class="tela">
    <h2>🛒 Mercado</h2>
    <div id="lista"></div>
    <button onclick="mostrar('menu')">Voltar</button>
</div>

<!-- DETALHE -->
<div id="detalhe" class="tela">
    <h2 id="detNome"></h2>
    <img id="detImg">
    <p id="detPreco"></p>
    <p id="detDesc"></p>

    <button class="verde" onclick="abrirMapa()">Comprar</button>
    <button onclick="mostrar('mercado')">Voltar</button>
</div>

<!-- MAPA -->
<div id="mapa" class="tela">
    <h2>📍 Negociação Cafunfo</h2>
    <div id="mapaReal" style="width:100%;height:300px;"></div>

    <p>🔴 Vendedor | 🟢 Você</p>
    <p>🤝 Em negociação</p>

    <button class="azul" onclick="ligar()">📞 Ligar</button>
    <button class="verde" onclick="mensagem()">💬 Mensagem</button>

    <button onclick="mostrar('mercado')">Voltar</button>
</div>

<script>
let usuarioAtual = null;

// TROCA TELA
function mostrar(id){
    document.querySelectorAll(".tela").forEach(t => t.classList.remove("ativa"));
    document.getElementById(id).classList.add("ativa");

    if(id === "perfil") carregarPerfil();
    if(id === "mercado") carregarProdutos();
}

// CRIAR CONTA
function criarConta(){
    let n = document.getElementById("novoNumero").value.trim();
    let s = document.getElementById("novaSenha").value.trim();

    if(!n || !s){
        alert("Preenche tudo!");
        return;
    }

    localStorage.setItem("numero", n);
    localStorage.setItem("senha", s);

    alert("Conta criada!");
    mostrar('login');
}

// LOGIN
function entrar(){
    let n = document.getElementById("loginNumero").value.trim();
    let s = document.getElementById("loginSenha").value.trim();

    let n2 = localStorage.getItem("numero");
    let s2 = localStorage.getItem("senha");

    if(n === n2 && s === s2){
        usuarioAtual = n;
        alert("Login feito!");
        mostrar('menu');
    } else {
        alert("Erro no login!");
    }
}

function logout(){
    usuarioAtual = null;
    mostrar('inicio');
}

// PUBLICAR
function publicarProduto(){
    let file = fotoProduto.files[0];
    if(!file) return alert("Escolhe foto!");

    let reader = new FileReader();
    reader.onload = function(){

        let produtos = JSON.parse(localStorage.getItem("produtos")) || [];

        produtos.push({
            nome: nomeProduto.value,
            preco: precoProduto.value,
            desc: descProduto.value,
            img: reader.result,
            dono: usuarioAtual
        });

        localStorage.setItem("produtos", JSON.stringify(produtos));

        alert("Publicado!");
        mostrar('mercado');
    };

    reader.readAsDataURL(file);
}

// MERCADO
function carregarProdutos(){
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    let produtos = JSON.parse(localStorage.getItem("produtos")) || [];

    produtos.forEach((p,i)=>{
        let div = document.createElement("div");
        div.className = "produto";
        div.innerHTML = `<img src="${p.img}"><p>${p.nome}</p><p>${p.preco} kz</p>`;
        div.onclick = ()=>verDetalhe(i);
        lista.appendChild(div);
    });
}

// DETALHE
function verDetalhe(i){
    let p = JSON.parse(localStorage.getItem("produtos"))[i];

    detNome.innerText = p.nome;
    detImg.src = p.img;
    detPreco.innerText = p.preco;
    detDesc.innerText = p.desc;

    mostrar('detalhe');
}

// PERFIL
function salvarFoto(){
    let reader = new FileReader();
    reader.onload = ()=>{
        localStorage.setItem("foto", reader.result);
        carregarPerfil();
    };
    reader.readAsDataURL(fotoPerfil.files[0]);
}

function carregarPerfil(){
    numPerfil.innerText = usuarioAtual;

    let foto = localStorage.getItem("foto");
    if(foto) imgPerfil.src = foto;

    let lista = document.getElementById("meusProdutos");
    lista.innerHTML = "";

    let produtos = JSON.parse(localStorage.getItem("produtos")) || [];

    produtos.forEach(p=>{
        if(p.dono === usuarioAtual){
            let div = document.createElement("div");
            div.className = "produto";
            div.innerHTML = `<img src="${p.img}"><p>${p.nome}</p>`;
            lista.appendChild(div);
        }
    });
}

// MAPA
let mapa, user, vendedor;
let cafunfo = [-8.766, 17.283];

function abrirMapa(){
    mostrar('mapa');

    setTimeout(()=>{

        if(!mapa){
            mapa = L.map('mapaReal').setView(cafunfo, 13);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
            .addTo(mapa);
        }

        navigator.geolocation.watchPosition(pos=>{
            let lat = pos.coords.latitude;
            let lon = pos.coords.longitude;

            if(user){
                user.setLatLng([lat,lon]);
            } else {
                user = L.circleMarker([lat,lon], {color:"green"})
                .addTo(mapa).bindPopup("Você");
            }

            let v = [cafunfo[0]+0.01, cafunfo[1]+0.01];

            if(vendedor){
                vendedor.setLatLng(v);
            } else {
                vendedor = L.circleMarker(v, {color:"red"})
                .addTo(mapa).bindPopup("Vendedor");
            }

            let grupo = L.featureGroup([user,vendedor]);
            mapa.fitBounds(grupo.getBounds(), {padding:[50,50]});

        });

    },500);
}

function ligar(){ alert("Ligando..."); }
function mensagem(){ alert("Mensagem..."); }
</script>

</body>
</html>
